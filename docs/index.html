<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DARKNYTE CLUB — Market Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06060f;
      --bg2:         #0d0d1e;
      --bg3:         #12122a;
      --brand:       #00d4ff;
      --open:        #00ff88;
      --closed:      #ff3366;
      --text:        #c8d0e8;
      --dim:         #4a5070;
      --border:      #1a1c38;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.035) 3px,
        rgba(0,0,0,0.035) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .brand-ethnocentric {
      font-family: "Ethnocentric", "Orbitron", "Rajdhani", sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand);
      text-shadow:
        0 0 18px rgba(0,212,255,0.55),
        0 0 40px rgba(0,212,255,0.2);
      line-height: 1;
    }

    .header-sub {
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 0.55rem;
    }

    .utc-clock {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.78rem, 1.8vw, 1rem);
      letter-spacing: 0.12em;
      color: rgba(0,212,255,0.7);
      margin-top: 1.1rem;
    }

    /* ── GRID ── */
    .markets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      padding: 2rem;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .market-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem 1.4rem 1.1rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .market-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 6px 6px 0 0;
    }

    .market-card.is-open   { border-color: rgba(0,255,136,0.28); }
    .market-card.is-open::before {
      background: var(--open);
      box-shadow: 0 0 10px rgba(0,255,136,0.7);
    }

    .market-card.is-closed { border-color: rgba(255,51,102,0.18); }
    .market-card.is-closed::before { background: var(--closed); }

    .market-card.is-holiday { border-color: rgba(74,80,112,0.3); }
    .market-card.is-holiday::before { background: var(--dim); }

    /* card header row */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }

    .market-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e0e4ff;
    }

    .market-code {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.06em;
      margin-top: 0.2rem;
    }

    .status-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 0.22rem 0.6rem;
      border-radius: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge.is-open {
      color: var(--open);
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.4);
      box-shadow: 0 0 8px rgba(0,255,136,0.35);
    }

    .status-badge.is-closed {
      color: var(--closed);
      background: rgba(255,51,102,0.07);
      border: 1px solid rgba(255,51,102,0.3);
    }

    .status-badge.is-holiday {
      color: var(--dim);
      background: rgba(74,80,112,0.12);
      border: 1px solid rgba(74,80,112,0.3);
    }

    /* local time */
    .local-time {
      font-family: 'Orbitron', monospace;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
    }

    .market-card.is-open .local-time {
      color: var(--open);
      text-shadow: 0 0 10px rgba(0,255,136,0.4);
    }

    .tz-label {
      font-size: 0.67rem;
      color: var(--dim);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* divider + info row */
    .card-info {
      margin-top: 0.85rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    .card-info .hours { color: #6a70a0; }

    .card-info .next-event { margin-top: 0.25rem; }

    .card-info .next-event .accent { color: var(--brand); }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    .site-footer a {
      color: var(--brand);
      text-decoration: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="brand-ethnocentric">DARKNYTE CLUB</div>
    <div class="header-sub">Global Market Hours</div>
    <div class="utc-clock" id="utc-clock">--:--:-- UTC</div>
  </header>

  <main class="markets-grid" id="markets-grid"></main>

  <footer class="site-footer">
    Data: <a href="market_calendar.json">market_calendar.json</a>
    &nbsp;·&nbsp; Generated <span id="generated-at">—</span>
    &nbsp;·&nbsp; Refreshes every 30s
  </footer>

  <script>
    'use strict';

    const MARKETS = [
      { key: 'Tokyo',     code: 'XTKS', tz: 'Asia/Tokyo',     hours: [['09:00','11:30'],['12:30','15:30']] },
      { key: 'Korea',     code: 'XKRX', tz: 'Asia/Seoul',     hours: [['09:00','15:30']] },
      { key: 'Shanghai',  code: 'XSHG', tz: 'Asia/Shanghai',  hours: [['09:30','11:30'],['13:00','15:00']] },
      { key: 'Taiwan',    code: 'XTAI', tz: 'Asia/Taipei',    hours: [['09:00','13:30']] },
      { key: 'Hong Kong', code: 'XHKG', tz: 'Asia/Hong_Kong', hours: [['09:30','12:00'],['13:00','16:00']] },
      { key: 'India',     code: 'XBOM', tz: 'Asia/Kolkata',   hours: [['09:15','15:30']] },
      { key: 'London',    code: 'XLON', tz: 'Europe/London',  hours: [['08:00','16:30']] },
      { key: 'New York',  code: 'XNYS', tz: 'America/New_York', hours: [['09:30','16:00']] }
    ];

    let calendarData = null;

    function pad(n) { return String(n).padStart(2, '0'); }

    function toMins(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }

    function fmtCountdown(mins) {
      if (mins >= 60) return `${Math.floor(mins / 60)}h ${pad(mins % 60)}m`;
      return `${mins}m`;
    }

    function getLocalParts(tz) {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
      const parts = Object.fromEntries(fmt.formatToParts(now).map(p => [p.type, p.value]));
      // normalise midnight "24" → "00"
      const h = parts.hour === '24' ? 0 : parseInt(parts.hour, 10);
      const m = parseInt(parts.minute, 10);
      const s = parseInt(parts.second, 10);
      return {
        date: `${parts.year}-${parts.month}-${parts.day}`,
        hhmmss: `${pad(h)}:${pad(m)}:${pad(s)}`,
        mins: h * 60 + m
      };
    }

    function getStatus(market) {
      const lp = getLocalParts(market.tz);
      if (!calendarData) return { cls: 'is-closed', badge: 'WAIT', lp, nextLine: '' };

      const mData = calendarData.markets[market.key];
      if (!mData) return { cls: 'is-closed', badge: '—', lp, nextLine: '' };

      const sessions  = new Set(mData.sessions || []);
      const holidays  = new Set(mData.holidays_or_closed_weekdays || []);

      if (holidays.has(lp.date) || !sessions.has(lp.date)) {
        return { cls: 'is-holiday', badge: 'CLOSED', lp, nextLine: 'No session today' };
      }

      const cur = lp.mins;

      // Check each window
      for (const [open, close] of market.hours) {
        const oM = toMins(open), cM = toMins(close);
        if (cur >= oM && cur < cM) {
          return {
            cls: 'is-open', badge: 'OPEN', lp,
            nextLine: `Closes <span class="accent">${close}</span> &nbsp;·&nbsp; ${fmtCountdown(cM - cur)} left`
          };
        }
      }

      // Pre-open window
      for (const [open] of market.hours) {
        const oM = toMins(open);
        if (cur < oM) {
          return {
            cls: 'is-closed', badge: 'PRE', lp,
            nextLine: `Opens <span class="accent">${open}</span> &nbsp;·&nbsp; in ${fmtCountdown(oM - cur)}`
          };
        }
      }

      return { cls: 'is-closed', badge: 'CLOSED', lp, nextLine: 'Session ended' };
    }

    function buildCard(market) {
      const { cls, badge, lp, nextLine } = getStatus(market);
      const id = market.key.replace(/\s+/g, '-');
      const hoursStr = market.hours.map(([o, c]) => `${o}–${c}`).join(' &nbsp; ');

      return `
        <div class="market-card ${cls}" id="card-${id}">
          <div class="card-top">
            <div>
              <div class="market-name">${market.key}</div>
              <div class="market-code">${market.code}</div>
            </div>
            <div class="status-badge ${cls}">${badge}</div>
          </div>
          <div class="local-time" id="time-${id}">${lp.hhmmss}</div>
          <div class="tz-label">${market.tz}</div>
          <div class="card-info">
            <div class="hours">${hoursStr}</div>
            ${nextLine ? `<div class="next-event">${nextLine}</div>` : ''}
          </div>
        </div>`;
    }

    function renderGrid() {
      const grid = document.getElementById('markets-grid');
      if (grid) grid.innerHTML = MARKETS.map(buildCard).join('');
    }

    function tickClocks() {
      // UTC header clock
      const now = new Date();
      const el = document.getElementById('utc-clock');
      if (el) {
        el.textContent = `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}  UTC`;
      }
      // Per-market second hand — update only the time element to avoid full reflow
      for (const market of MARKETS) {
        const id = market.key.replace(/\s+/g, '-');
        const tel = document.getElementById(`time-${id}`);
        if (tel) tel.textContent = getLocalParts(market.tz).hhmmss;
      }
    }

    async function init() {
      try {
        const res = await fetch('market_calendar.json');
        calendarData = await res.json();
        const genEl = document.getElementById('generated-at');
        if (genEl && calendarData.generated_at_utc) {
          genEl.textContent = calendarData.generated_at_utc.slice(0, 10);
        }
      } catch (e) {
        console.warn('Could not load market_calendar.json', e);
      }
      renderGrid();
      setInterval(renderGrid, 30000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      init();
      tickClocks();
      setInterval(tickClocks, 1000);
    });
  </script>
</body>
</html>
