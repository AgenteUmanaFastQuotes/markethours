name: Update Market Calendar JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate market calendar JSON
        run: python scripts/generate_market_calendar.py

      - name: Validate JSON
        run: python -m json.tool docs/market_calendar.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/market_calendar.json
          git diff --cached --quiet || git commit -m "Update market calendar JSON"
          git push
